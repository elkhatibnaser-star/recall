<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recall">
<meta name="theme-color" content="#0a0a0f">
<title>Recall</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a2e;--text:#e4e4e7;--text2:#a1a1aa;--text3:#52525b;--text4:#3f3f46;--border:#1a1a2e;--accent:#6366f1}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;min-height:100dvh;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0}
input,textarea,button{font-family:inherit;-webkit-appearance:none;appearance:none}
.app{max-width:480px;margin:0 auto;padding:0 20px 100px;min-height:100vh;min-height:100dvh}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border)}
.header-center{text-align:center;flex:1}
.title{font-size:20px;font-weight:600;letter-spacing:-0.02em}
.subtitle{font-size:13px;color:var(--text3);margin-top:2px}
.btn{background:none;border:1px solid #27272a;border-radius:10px;padding:10px 16px;color:var(--text);cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:8px;transition:all .15s;font-weight:400}
.btn:active{transform:scale(.97);opacity:.8}
.btn-p{background:var(--accent);border:1px solid var(--accent);border-radius:10px;padding:10px 16px;color:#fff;cursor:pointer;font-size:14px;font-weight:500;display:inline-flex;align-items:center;gap:8px;transition:all .15s;justify-content:center;width:100%}
.btn-p:active{transform:scale(.97);opacity:.8}
.btn-s{background:none;border:none;color:var(--text3);cursor:pointer;padding:8px;border-radius:8px;display:flex;align-items:center;transition:color .15s}
.btn-s:active{color:var(--text)}
.input{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;width:100%;outline:none;transition:border-color .2s}
.input:focus{border-color:#333}
.textarea{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;width:100%;outline:none;min-height:90px;resize:vertical;transition:border-color .2s;line-height:1.5}
.textarea:focus{border-color:#333}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 18px;transition:border-color .15s}
.card:active{border-color:#333}
.label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-weight:500;margin-bottom:6px}
.badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;font-family:'JetBrains Mono',monospace}
.mono{font-family:'JetBrains Mono',monospace}
.due-banner{background:linear-gradient(135deg,#1e1b4b 0%,#172554 100%);border-radius:14px;padding:18px 20px;margin-top:20px;display:flex;justify-content:space-between;align-items:center}
.review-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:40px 28px;margin-top:28px;min-height:240px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.answer-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:20px}
.answer-btn{border:1px solid var(--border);border-radius:12px;padding:14px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;transition:transform .1s}
.answer-btn:active{transform:scale(.95)}
.toolbar{display:flex;gap:8px;margin-top:16px}
.toolbar .btn{flex:1;justify-content:center;padding:9px 12px;color:var(--text2)}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.switch{position:relative;width:44px;height:26px;flex-shrink:0}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#27272a;border-radius:999px;cursor:pointer;transition:.2s}
.slider:before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;background:white;border-radius:50%;transition:.2s}
.switch input:checked + .slider{background:var(--accent)}
.switch input:checked + .slider:before{transform:translateX(18px)}
.color-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;padding:0}
.color-dot.active{border-color:var(--text)}
.empty{text-align:center;padding:48px 20px;color:var(--text4)}
.deck-list{margin-top:24px;display:flex;flex-direction:column;gap:10px}
.form-group{display:flex;flex-direction:column;gap:20px;margin-top:24px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:28px}
.stat-box{background:var(--bg2);border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:24px;font-weight:600;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:12px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s ease}
.flex-row{display:flex;gap:10px}
.flex-1{flex:1}
.mt-20{margin-top:20px}
.hidden{display:none}
@media (max-width:420px){
  .app{padding-left:14px;padding-right:14px}
  .header{gap:10px}
  .btn{padding:9px 12px}
  .answer-grid{grid-template-columns:1fr 1fr}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .25s ease}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// STATE
let state = {
  decks: [],
  appStats: { days: {} },
  reviewLog: [],
  tombstones: [],
  profile: { id: '', name: 'Learner', email: '', created: Date.now() },
  settings: { dailyGoal: 20, newCardsPerSession: 20, reviewsPerSession: 100, buryAgainCards: true, keyboardShortcuts: true, autoSync: true, updatedAt: Date.now() },
  sync: { enabled: false, provider: 'supabase', lastSync: null, deviceId: '', supabaseUrl: '', supabaseAnonKey: '', accessToken: '', refreshToken: '', userId: '', userEmail: '' },
  view: 'home',
  currentDeckId: null,
  reviewQueue: [],
  reviewIndex: 0,
  flipped: false,
  stats: { reviewed:0, again:0, hard:0, good:0, easy:0 },
  showDone: false,
  editingCardId: null,
  searchQuery: '',
};

const COLORS = ['#6366f1','#ec4899','#14b8a6','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#84cc16'];
let selectedColor = COLORS[0];
let syncTimer = null;
let syncInFlight = false;
let suppressAutoSync = false;

// STORAGE
function save() {
  try { localStorage.setItem('recall-decks', JSON.stringify(state.decks)); } catch(e) {}
  try { localStorage.setItem('recall-stats', JSON.stringify(state.appStats)); } catch(e) {}
  try { localStorage.setItem('recall-review-log', JSON.stringify(state.reviewLog)); } catch(e) {}
  try { localStorage.setItem('recall-tombstones', JSON.stringify(state.tombstones)); } catch(e) {}
  try { localStorage.setItem('recall-profile', JSON.stringify(state.profile)); } catch(e) {}
  try { localStorage.setItem('recall-settings', JSON.stringify(state.settings)); } catch(e) {}
  try { localStorage.setItem('recall-sync', JSON.stringify(state.sync)); } catch(e) {}
  scheduleAutoPush();
}
function load() {
  try {
    const d = localStorage.getItem('recall-decks');
    if (d) state.decks = normalizeDecks(JSON.parse(d));
  } catch(e) {}
  try {
    const s = localStorage.getItem('recall-stats');
    if (s) state.appStats = normalizeStats(JSON.parse(s));
  } catch(e) {}
  try {
    const log = localStorage.getItem('recall-review-log');
    if (log) state.reviewLog = normalizeReviewLog(JSON.parse(log));
  } catch(e) {}
  try {
    const tombstones = localStorage.getItem('recall-tombstones');
    if (tombstones) state.tombstones = normalizeTombstones(JSON.parse(tombstones));
  } catch(e) {}
  try {
    const p = localStorage.getItem('recall-profile');
    state.profile = normalizeProfile(p ? JSON.parse(p) : state.profile);
  } catch(e) { state.profile = normalizeProfile(state.profile); }
  try {
    const settings = localStorage.getItem('recall-settings');
    state.settings = normalizeSettings(settings ? JSON.parse(settings) : state.settings);
  } catch(e) { state.settings = normalizeSettings(state.settings); }
  try {
    const sync = localStorage.getItem('recall-sync');
    state.sync = normalizeSync(sync ? JSON.parse(sync) : state.sync);
  } catch(e) { state.sync = normalizeSync(state.sync); }
  state.appStats = deriveStatsFromReviewLog(state.reviewLog, state.appStats);
  save();
}

function normalizeDecks(decks) {
  if (!Array.isArray(decks)) return [];
  return decks.map(deck => ({
    id: deck.id || createId(),
    name: String(deck.name || 'Untitled deck'),
    color: COLORS.includes(deck.color) ? deck.color : COLORS[0],
    created: Number(deck.created) || Date.now(),
    updatedAt: Number(deck.updatedAt) || Number(deck.created) || Date.now(),
    cards: Array.isArray(deck.cards) ? deck.cards.map(card => ({
      id: card.id || createId(),
      front: String(card.front || ''),
      back: String(card.back || ''),
      interval: Number(card.interval) || 0,
      easeFactor: Math.max(1.3, Number(card.easeFactor) || 2.5),
      repetitions: Math.max(0, Number(card.repetitions) || 0),
      nextReview: Number(card.nextReview) || Date.now(),
      lastReview: card.lastReview ? Number(card.lastReview) : null,
      created: Number(card.created) || Date.now(),
      updatedAt: Number(card.updatedAt) || Number(card.created) || Date.now(),
      learningState: normalizeLearningState(card.learningState || inferLearningState(card)),
      tags: Array.isArray(card.tags) ? card.tags.map(t => String(t).trim()).filter(Boolean) : [],
    })).filter(card => card.front || card.back) : [],
  }));
}

function normalizeStats(stats) {
  const days = stats && typeof stats.days === 'object' && stats.days ? stats.days : {};
  const normalizedDays = {};
  Object.entries(days).forEach(([key, day]) => {
    normalizedDays[key] = {
      reviewed: Number(day.reviewed) || 0,
      again: Number(day.again) || 0,
      hard: Number(day.hard) || 0,
      good: Number(day.good) || 0,
      easy: Number(day.easy) || 0,
      eventIds: Array.isArray(day.eventIds) ? day.eventIds.map(String) : [],
    };
  });
  return { days: normalizedDays };
}

function normalizeReviewLog(log) {
  if (!Array.isArray(log)) return [];
  return log.map(event => ({
    id: event.id || createId(),
    cardId: String(event.cardId || ''),
    deckId: String(event.deckId || ''),
    quality: clampNumber(event.quality, 0, 3, 0),
    reviewedAt: Number(event.reviewedAt) || Date.now(),
    deviceId: String(event.deviceId || state.sync?.deviceId || ''),
  })).filter(event => event.cardId && event.deckId);
}

function normalizeTombstones(tombstones) {
  if (!Array.isArray(tombstones)) return [];
  return tombstones.map(item => ({
    id: String(item.id || ''),
    type: item.type === 'deck' ? 'deck' : 'card',
    parentId: item.parentId ? String(item.parentId) : null,
    deletedAt: Number(item.deletedAt) || Date.now(),
    deviceId: String(item.deviceId || state.sync?.deviceId || ''),
  })).filter(item => item.id);
}

function deriveStatsFromReviewLog(log, fallback = { days: {} }) {
  const stats = normalizeStats(fallback);
  normalizeReviewLog(log).forEach(event => {
    const key = dateKeyFromTimestamp(event.reviewedAt);
    const day = stats.days[key] || { reviewed:0, again:0, hard:0, good:0, easy:0 };
    if (day.eventIds?.includes(event.id)) return;
    day.eventIds = [...(day.eventIds || []), event.id];
    day.reviewed++;
    day[['again','hard','good','easy'][event.quality]]++;
    stats.days[key] = day;
  });
  return stats;
}

function normalizeProfile(profile) {
  return {
    id: profile.id || createId(),
    name: String(profile.name || 'Learner'),
    email: String(profile.email || ''),
    created: Number(profile.created) || Date.now(),
    updatedAt: Number(profile.updatedAt) || Date.now(),
  };
}

function normalizeSettings(settings) {
  return {
    dailyGoal: clampNumber(settings.dailyGoal, 1, 500, 20),
    newCardsPerSession: clampNumber(settings.newCardsPerSession, 1, 200, 20),
    reviewsPerSession: clampNumber(settings.reviewsPerSession, 1, 500, 100),
    buryAgainCards: settings.buryAgainCards !== false,
    keyboardShortcuts: settings.keyboardShortcuts !== false,
    autoSync: settings.autoSync !== false,
    updatedAt: Number(settings.updatedAt) || Date.now(),
  };
}

function normalizeSync(sync) {
  return {
    enabled: Boolean(sync.enabled),
    provider: sync.provider || 'supabase',
    lastSync: sync.lastSync ? Number(sync.lastSync) : null,
    deviceId: sync.deviceId || createId(),
    supabaseUrl: String(sync.supabaseUrl || ''),
    supabaseAnonKey: String(sync.supabaseAnonKey || ''),
    accessToken: String(sync.accessToken || ''),
    refreshToken: String(sync.refreshToken || ''),
    userId: String(sync.userId || ''),
    userEmail: String(sync.userEmail || ''),
  };
}

function clampNumber(value, min, max, fallback) {
  const n = Number(value);
  if (!Number.isFinite(n)) return fallback;
  return Math.max(min, Math.min(max, Math.round(n)));
}

function createId() {
  return (globalThis.crypto?.randomUUID?.() || `${Date.now()}-${Math.random().toString(16).slice(2)}`);
}

function inferLearningState(card) {
  if (!card.lastReview || !card.repetitions) return 'new';
  if ((Number(card.interval) || 0) < 1) return 'learning';
  return 'review';
}

function normalizeLearningState(value) {
  return ['new','learning','review'].includes(value) ? value : 'new';
}

// REVIEW SCHEDULING
function getNextReview(quality, card) {
  const now = Date.now();
  let interval = Math.max(0, Number(card.interval) || 0);
  let easeFactor = Math.max(1.3, Number(card.easeFactor) || 2.5);
  let repetitions = Math.max(0, Number(card.repetitions) || 0);

  if (quality === 0) {
    repetitions = 0;
    interval = 10 / 1440; // 10 minutes
    easeFactor = Math.max(1.3, easeFactor - 0.2);
  } else {
    const firstSteps = [0, 1, 3, 4];
    if (repetitions === 0) interval = firstSteps[quality];
    else if (repetitions === 1) interval = quality === 1 ? 2 : quality === 2 ? 4 : 7;
    else {
      const multiplier = quality === 1 ? 1.2 : quality === 2 ? easeFactor : easeFactor * 1.3;
      interval = Math.max(1, Math.round(interval * multiplier));
    }
    repetitions++;
    easeFactor = Math.max(1.3, easeFactor + (quality === 1 ? -0.15 : quality === 2 ? 0 : 0.15));
  }

  const learningState = quality <= 1 || interval < 1 ? 'learning' : 'review';
  return { interval, easeFactor, repetitions, learningState, nextReview: now + interval * 86400000, lastReview: now };
}

function getDueCards(cards) { return (cards || []).filter(c => c.nextReview <= Date.now()); }

function countCardStates(cards) {
  return (cards || []).reduce((counts, card) => {
    const key = card.learningState || inferLearningState(card);
    counts[key] = (counts[key] || 0) + 1;
    return counts;
  }, { new:0, learning:0, review:0 });
}

function formatInterval(nr) {
  const ms = nr - Date.now();
  if (ms <= 0) return 'now';
  const min = Math.ceil(ms / 60000);
  if (min < 60) return `${min}m`;
  const h = Math.ceil(ms / 3600000);
  if (h < 24) return `${h}h`;
  const d = Math.round(ms / 86400000);
  if (d === 1) return '1d';
  if (d < 30) return d + 'd';
  if (d < 365) return Math.round(d/30) + 'mo';
  return Math.round(d/365) + 'y';
}

function previewInterval(quality, card) {
  return formatInterval(getNextReview(quality, card).nextReview);
}

function getDeck() { return state.decks.find(d => d.id === state.currentDeckId); }

function todayKey(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return dateKeyFromTimestamp(d.getTime());
}

function dateKeyFromTimestamp(timestamp) {
  const d = new Date(timestamp);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function recordDailyReview(quality, deckId, cardId) {
  const reviewedAt = Date.now();
  const event = {
    id: createId(),
    deckId,
    cardId,
    quality,
    reviewedAt,
    deviceId: state.sync.deviceId,
  };
  state.reviewLog.push(event);
  const key = dateKeyFromTimestamp(reviewedAt);
  const day = state.appStats.days[key] || { reviewed:0, again:0, hard:0, good:0, easy:0 };
  const names = ['again','hard','good','easy'];
  day.eventIds = [...(day.eventIds || []), event.id];
  day.reviewed++;
  day[names[quality]]++;
  state.appStats.days[key] = day;
}

function getCurrentStreak() {
  let streak = 0;
  for (let i = 0; i < 3650; i++) {
    const day = state.appStats.days[todayKey(-i)];
    if (!day || !day.reviewed) break;
    streak++;
  }
  return streak;
}

function parseTags(value) {
  return String(value || '').split(',').map(t => t.trim().replace(/^#/, '')).filter(Boolean);
}

function getInitials(name) {
  return String(name || 'Learner').trim().split(/\s+/).slice(0,2).map(part => part[0] || '').join('').toUpperCase() || 'L';
}

function touchDeck(deck) {
  if (deck) deck.updatedAt = Date.now();
}

function touchCard(deck, card) {
  if (card) card.updatedAt = Date.now();
  touchDeck(deck);
}

function addTombstone(type, id, parentId = null) {
  const deletedAt = Date.now();
  state.tombstones = state.tombstones.filter(item => !(item.type === type && item.id === id));
  state.tombstones.push({ id, type, parentId, deletedAt, deviceId: state.sync.deviceId });
}

function getSyncPayload() {
  return {
    version: 1,
    exportedAt: new Date().toISOString(),
    profile: state.profile,
    settings: state.settings,
    appStats: state.appStats,
    reviewLog: state.reviewLog,
    tombstones: state.tombstones,
    decks: state.decks,
  };
}

function applySyncPayload(payload) {
  const merged = mergeSyncPayload(getSyncPayload(), payload || {});
  state.decks = merged.decks;
  state.appStats = merged.appStats;
  state.reviewLog = merged.reviewLog;
  state.tombstones = merged.tombstones;
  state.profile = merged.profile;
  state.settings = merged.settings;
}

function mergeSyncPayload(localPayload, remotePayload) {
  const localProfile = normalizeProfile(localPayload.profile || state.profile);
  const remoteProfile = normalizeProfile(remotePayload.profile || localProfile);
  const merged = {
    version: Math.max(Number(localPayload.version) || 1, Number(remotePayload.version) || 1),
    profile: pickNewer(localProfile, remoteProfile),
    settings: pickNewerSettings(localPayload.settings, remotePayload.settings),
    reviewLog: mergeReviewLogs(localPayload.reviewLog || [], remotePayload.reviewLog || []),
    tombstones: mergeTombstones(localPayload.tombstones || [], remotePayload.tombstones || []),
    appStats: { days: {} },
    decks: [],
  };
  merged.decks = mergeDecks(localPayload.decks || [], remotePayload.decks || [], merged.tombstones);
  merged.appStats = deriveStatsFromReviewLog(merged.reviewLog, mergeStats(localPayload.appStats || {}, remotePayload.appStats || remotePayload.stats || {}));
  return merged;
}

function mergeReviewLogs(localLog, remoteLog) {
  const map = new Map();
  normalizeReviewLog(localLog).forEach(event => map.set(event.id, event));
  normalizeReviewLog(remoteLog).forEach(event => map.set(event.id, event));
  return [...map.values()].sort((a,b) => a.reviewedAt - b.reviewedAt);
}

function mergeTombstones(localTombstones, remoteTombstones) {
  const map = new Map();
  normalizeTombstones(localTombstones).forEach(item => map.set(`${item.type}:${item.id}`, item));
  normalizeTombstones(remoteTombstones).forEach(item => {
    const existing = map.get(`${item.type}:${item.id}`);
    if (!existing || item.deletedAt > existing.deletedAt) map.set(`${item.type}:${item.id}`, item);
  });
  return [...map.values()].sort((a,b) => b.deletedAt - a.deletedAt);
}

function mergeDecks(localDecks, remoteDecks, tombstones = []) {
  const map = new Map();
  const deletedDecks = new Map(tombstones.filter(item => item.type === 'deck').map(item => [item.id, item.deletedAt]));
  const deletedCards = new Map(tombstones.filter(item => item.type === 'card').map(item => [item.id, item.deletedAt]));
  normalizeDecks(localDecks).forEach(deck => map.set(deck.id, deck));
  normalizeDecks(remoteDecks).forEach(remoteDeck => {
    const localDeck = map.get(remoteDeck.id);
    if (!localDeck) {
      map.set(remoteDeck.id, remoteDeck);
      return;
    }
    const winner = pickNewer(localDeck, remoteDeck);
    map.set(remoteDeck.id, {
      ...winner,
      cards: mergeCards(localDeck.cards, remoteDeck.cards, deletedCards),
      updatedAt: Math.max(Number(localDeck.updatedAt) || 0, Number(remoteDeck.updatedAt) || 0),
    });
  });
  return [...map.values()].filter(deck => {
    const deletedAt = deletedDecks.get(deck.id);
    return !deletedAt || (Number(deck.updatedAt) || 0) > deletedAt;
  }).sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0));
}

function mergeCards(localCards, remoteCards, deletedCards = new Map()) {
  const map = new Map();
  normalizeDecks([{ id:'tmp', name:'tmp', cards: localCards || [] }])[0].cards.forEach(card => map.set(card.id, card));
  normalizeDecks([{ id:'tmp', name:'tmp', cards: remoteCards || [] }])[0].cards.forEach(remoteCard => {
    const localCard = map.get(remoteCard.id);
    map.set(remoteCard.id, localCard ? pickNewer(localCard, remoteCard) : remoteCard);
  });
  return [...map.values()].filter(card => {
    const deletedAt = deletedCards.get(card.id);
    return !deletedAt || (Number(card.updatedAt) || 0) > deletedAt;
  }).sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0));
}

function mergeStats(localStats, remoteStats) {
  const local = normalizeStats(localStats);
  const remote = normalizeStats(remoteStats);
  const days = { ...local.days };
  Object.entries(remote.days).forEach(([key, remoteDay]) => {
    const localDay = days[key] || {};
    const eventIds = [...new Set([...(localDay.eventIds || []), ...(remoteDay.eventIds || [])])];
    days[key] = {
      reviewed: Math.max(Number(localDay.reviewed) || 0, Number(remoteDay.reviewed) || 0),
      again: Math.max(Number(localDay.again) || 0, Number(remoteDay.again) || 0),
      hard: Math.max(Number(localDay.hard) || 0, Number(remoteDay.hard) || 0),
      good: Math.max(Number(localDay.good) || 0, Number(remoteDay.good) || 0),
      easy: Math.max(Number(localDay.easy) || 0, Number(remoteDay.easy) || 0),
      eventIds,
    };
  });
  return { days };
}

function pickNewer(localItem, remoteItem) {
  const localTime = Number(localItem?.updatedAt || localItem?.created) || 0;
  const remoteTime = Number(remoteItem?.updatedAt || remoteItem?.created) || 0;
  return remoteTime > localTime ? remoteItem : localItem;
}

function pickNewerSettings(localSettings, remoteSettings) {
  const local = normalizeSettings(localSettings || state.settings);
  const remote = normalizeSettings(remoteSettings || local);
  return remote.updatedAt > local.updatedAt ? remote : local;
}

function syncHeaders(useAuth = true) {
  const headers = {
    apikey: state.sync.supabaseAnonKey,
    'Content-Type': 'application/json',
  };
  if (useAuth && state.sync.accessToken) headers.Authorization = `Bearer ${state.sync.accessToken}`;
  return headers;
}

function assertSyncReady(needsAuth = true) {
  if (!state.sync.enabled) throw new Error('Cloud sync is disabled in Settings.');
  if (!state.sync.supabaseUrl || !state.sync.supabaseAnonKey) throw new Error('Supabase URL and anon key are required.');
  if (needsAuth && !state.sync.accessToken) throw new Error('Sign in to Supabase first.');
}

function canAutoSync() {
  return state.settings.autoSync && state.sync.enabled && state.sync.accessToken && state.sync.supabaseUrl && state.sync.supabaseAnonKey;
}

function scheduleAutoPush(delay = 2500) {
  if (suppressAutoSync || !canAutoSync()) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => autoPushSync(), delay);
}

async function autoPushSync() {
  if (!canAutoSync() || syncInFlight) return;
  syncInFlight = true;
  try {
    await saveCloudState(getSyncPayload(), false);
  } catch(e) {
    console.warn('Auto sync push failed', e);
  } finally {
    syncInFlight = false;
  }
}

async function autoPullSync() {
  if (!canAutoSync() || syncInFlight) return;
  syncInFlight = true;
  try {
    const rows = await supabaseRequest(`/rest/v1/recall_sync_state?select=payload,updated_at&user_id=eq.${encodeURIComponent(state.sync.userId)}&limit=1`);
    if (rows && rows.length) {
      suppressAutoSync = true;
      applySyncPayload(rows[0].payload || {});
      state.sync = normalizeSync({ ...state.sync, lastSync: Date.parse(rows[0].updated_at) || Date.now() });
      save();
      suppressAutoSync = false;
      await saveCloudState(getSyncPayload(), false);
      render();
    }
  } catch(e) {
    console.warn('Auto sync pull failed', e);
  } finally {
    suppressAutoSync = false;
    syncInFlight = false;
  }
}

async function supabaseRequest(path, options = {}, needsAuth = true) {
  assertSyncReady(needsAuth);
  const base = state.sync.supabaseUrl.replace(/\/$/, '');
  const response = await fetch(`${base}${path}`, {
    ...options,
    headers: { ...syncHeaders(needsAuth), ...(options.headers || {}) },
  });
  const text = await response.text();
  const data = text ? JSON.parse(text) : null;
  if (!response.ok) throw new Error(data?.msg || data?.message || data?.error_description || data?.error || `Supabase request failed (${response.status})`);
  return data;
}

async function saveCloudState(payload, triggerLocalSave = true) {
  await supabaseRequest('/rest/v1/recall_sync_state?on_conflict=user_id', {
    method: 'POST',
    headers: { Prefer: 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify({
      user_id: state.sync.userId,
      payload,
      updated_at: new Date().toISOString(),
    }),
  });
  state.sync = normalizeSync({ ...state.sync, lastSync: Date.now() });
  if (triggerLocalSave) save();
  else {
    suppressAutoSync = true;
    save();
    suppressAutoSync = false;
  }
}

    { label:'Again', sub:previewInterval(0, card), color:'#ef4444', bg:'#1c0a0a' },
    { label:'Hard', sub:previewInterval(1, card), color:'#f59e0b', bg:'#1c1508' },
    { label:'Good', sub:previewInterval(2, card), color:'#4ade80', bg:'#0a1c10' },
    { label:'Easy', sub:previewInterval(3, card), color:'#60a5fa', bg:'#0a101c' },
  ];

  return `<div class="fade-in">
    <div class="header">
      <button class="btn-s" onclick="goTo('home')">${ico.back}</button>
      <div class="header-center">
        <div style="font-size:14px;font-weight:500">${esc(deck.name)}</div>
        <div style="font-size:12px;color:var(--text3)">${state.reviewIndex+1} / ${state.reviewQueue.length}</div>
      </div>
      <div style="width:34px"></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;background:${deck.color}"></div></div>
    <div class="review-card" ${!state.flipped ? 'onclick="flipCard()" style="cursor:pointer"' : ''}>
      ${!state.flipped ? `
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px">Question</div>
        <div style="font-size:18px;font-weight:500;line-height:1.5">${esc(card.front)}</div>
        <div style="font-size:12px;color:var(--text4);margin-top:24px;display:flex;align-items:center;gap:6px">${ico.flip} Tap to reveal</div>
      ` : `
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Question</div>
        <div style="font-size:14px;color:var(--text2);margin-bottom:20px">${esc(card.front)}</div>
        <div style="width:40px;height:1px;background:#27272a;margin-bottom:20px"></div>
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Answer</div>
        <div style="font-size:17px;font-weight:500;line-height:1.6">${esc(card.back)}</div>
      `}
    </div>
    ${state.flipped ? `<div class="answer-grid">
      ${intervals.map((b,i) => `<button class="answer-btn" style="background:${b.bg}" onclick="answerCard(${i})">
        <span style="font-size:13px;font-weight:500;color:${b.color}">${b.label}</span>
        <span style="font-size:11px;color:var(--text3)" class="mono">${b.sub}</span>
      </button>`).join('')}
    </div>` : ''}
  </div>`;
}

function renderDone() {
  const s = state.stats;
  const total = s.reviewed;
  const acc = total > 0 ? Math.round(((s.good + s.easy) / total) * 100) : 0;
  const deck = getDeck();
  const streak = getCurrentStreak();

  return `<div class="fade-in" style="padding-top:60px;text-align:center">
    <div style="width:64px;height:64px;border-radius:50%;background:#14532d;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">${ico.check}</div>
    <div style="font-size:22px;font-weight:600">Session complete</div>
    <div style="font-size:14px;color:var(--text3);margin-top:6px">${total} cards reviewed</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num" style="color:#4ade80">${acc}%</div><div class="stat-label">Accuracy</div></div>
      <div class="stat-box"><div class="stat-num">${streak}</div><div class="stat-label">Day streak</div></div>
    </div>
    <div style="display:flex;justify-content:center;gap:16px;margin-top:20px;font-size:13px">
      <span style="color:#ef4444">Again: ${s.again}</span>
      <span style="color:#f59e0b">Hard: ${s.hard}</span>
      <span style="color:#4ade80">Good: ${s.good}</span>
      <span style="color:#60a5fa">Easy: ${s.easy}</span>
    </div>
    <button class="btn-p" style="margin-top:32px;background:${deck?deck.color:'var(--accent)'};border-color:${deck?deck.color:'var(--accent)'}" onclick="goTo('home')">Done</button>
  </div>`;
}

// HELPERS
function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function attr(s) { return esc(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

// ACTIONS
window.goTo = function(view) {
  state.view = view;
  state.editingCardId = null;
  if (view !== 'deck') state.searchQuery = '';
  if (view === 'home') state.currentDeckId = null;
  render();
  if (view === 'addDeck') setTimeout(() => document.getElementById('deckName')?.focus(), 50);
  if (view === 'addCard') setTimeout(() => document.getElementById('cardFront')?.focus(), 50);
};

window.pickColor = function(c) { selectedColor = c; render(); };

window.openDeck = function(id) {
  state.currentDeckId = id;
  state.view = 'deck';
  render();
};

window.addDeck = function() {
  const name = document.getElementById('deckName')?.value?.trim();
  if (!name) return;
  const now = Date.now();
  state.decks.push({ id: createId(), name, color: selectedColor, cards: [], created: now, updatedAt: now });
  save();
  state.view = 'home';
  render();
};

window.deleteDeck = function(id) {
  if (!confirm('Delete this deck and all its cards?')) return;
  const deck = state.decks.find(d => d.id === id);
  if (deck) {
    addTombstone('deck', deck.id);
    deck.cards.forEach(card => addTombstone('card', card.id, deck.id));
  }
  state.decks = state.decks.filter(d => d.id !== id);
  save();
  if (state.currentDeckId === id) { state.currentDeckId = null; state.view = 'home'; }
  render();
};

window.addCard = function() {
  const front = document.getElementById('cardFront')?.value?.trim();
  const back = document.getElementById('cardBack')?.value?.trim();
  const tags = parseTags(document.getElementById('cardTags')?.value);
  if (!front || !back) return;
  const deck = getDeck();
  if (!deck) return;
  deck.cards.push({
    id: createId(), front, back,
    interval: 0, easeFactor: 2.5, repetitions: 0,
    nextReview: Date.now(), lastReview: null, created: Date.now(), updatedAt: Date.now(),
    learningState: 'new', tags,
  });
  touchDeck(deck);
  save();
  render();
  setTimeout(() => {
    const f = document.getElementById('cardFront');
    if (f) { f.value = ''; document.getElementById('cardBack').value = ''; document.getElementById('cardTags').value = ''; f.focus(); }
  }, 50);
};

window.editCard = function(cardId) {
  state.editingCardId = cardId;
  state.view = 'addCard';
  render();
};

window.saveCard = function() {
  const front = document.getElementById('cardFront')?.value?.trim();
  const back = document.getElementById('cardBack')?.value?.trim();
  const tags = parseTags(document.getElementById('cardTags')?.value);
  if (!front || !back) return;
  const deck = getDeck();
  const card = deck?.cards.find(c => c.id === state.editingCardId);
  if (!card) return;
  card.front = front;
  card.back = back;
  card.tags = tags;
  touchCard(deck, card);
  save();
  state.editingCardId = null;
  state.view = 'deck';
  render();
};

window.deleteCard = function(cardId) {
  const deck = getDeck();
  if (!deck) return;
  if (!confirm('Delete this card?')) return;
  addTombstone('card', cardId, deck.id);
  deck.cards = deck.cards.filter(c => c.id !== cardId);
  touchDeck(deck);
  save();
  render();
};

window.saveProfile = function() {
  const name = document.getElementById('profileName')?.value?.trim() || 'Learner';
  const email = document.getElementById('profileEmail')?.value?.trim() || '';
  state.profile = normalizeProfile({ ...state.profile, name, email, updatedAt: Date.now() });
  save();
  render();
};

window.saveSettings = function() {
  state.settings = normalizeSettings({
    dailyGoal: document.getElementById('dailyGoal')?.value,
    newCardsPerSession: document.getElementById('newCardsPerSession')?.value,
    reviewsPerSession: document.getElementById('reviewsPerSession')?.value,
    buryAgainCards: document.getElementById('buryAgainCards')?.checked,
    keyboardShortcuts: document.getElementById('keyboardShortcuts')?.checked,
    autoSync: document.getElementById('autoSync')?.checked,
    updatedAt: Date.now(),
  });
  state.sync = normalizeSync({
    ...state.sync,
    enabled: document.getElementById('syncEnabled')?.checked,
    provider: 'supabase',
    supabaseUrl: document.getElementById('supabaseUrl')?.value?.trim(),
    supabaseAnonKey: document.getElementById('supabaseAnonKey')?.value?.trim(),
    userEmail: document.getElementById('syncEmail')?.value?.trim() || state.sync.userEmail,
  });
  save();
  render();
};

async function authenticateSync(mode) {
  try {
    saveSettingsFromFields(false);
    assertSyncReady(false);
    const email = document.getElementById('syncEmail')?.value?.trim();
    const password = document.getElementById('syncPassword')?.value || '';
    if (!email || !password) throw new Error('Email and password are required.');
    const path = mode === 'signup' ? '/auth/v1/signup' : '/auth/v1/token?grant_type=password';
    const data = await supabaseRequest(path, {
      method: 'POST',
      body: JSON.stringify({ email, password }),
    }, false);
    const session = data.session || data;
    if (!session.access_token) {
      state.sync = normalizeSync({ ...state.sync, enabled: true, userEmail: email });
      state.profile = normalizeProfile({ ...state.profile, email });
      save();
      alert('Account created. Confirm your email if Supabase asks for it, then sign in.');
      render();
      return;
    }
    state.sync = normalizeSync({
      ...state.sync,
      enabled: true,
      userEmail: data.user?.email || session.user?.email || email,
      userId: data.user?.id || session.user?.id || state.sync.userId,
      accessToken: session.access_token || state.sync.accessToken,
      refreshToken: session.refresh_token || state.sync.refreshToken,
    });
    state.profile = normalizeProfile({ ...state.profile, email });
    save();
    alert(mode === 'signup' ? 'Account created. You are signed in.' : 'Signed in.');
    autoPullSync();
    render();
  } catch(e) {
    alert(e.message || 'Could not sign in.');
  }
}

function saveSettingsFromFields(rerender = true) {
  state.settings = normalizeSettings({
    dailyGoal: document.getElementById('dailyGoal')?.value,
    newCardsPerSession: document.getElementById('newCardsPerSession')?.value,
    reviewsPerSession: document.getElementById('reviewsPerSession')?.value,
    buryAgainCards: document.getElementById('buryAgainCards')?.checked,
    keyboardShortcuts: document.getElementById('keyboardShortcuts')?.checked,
    autoSync: document.getElementById('autoSync')?.checked,
    updatedAt: Date.now(),
  });
  state.sync = normalizeSync({
    ...state.sync,
    enabled: document.getElementById('syncEnabled')?.checked,
    provider: 'supabase',
    supabaseUrl: document.getElementById('supabaseUrl')?.value?.trim(),
    supabaseAnonKey: document.getElementById('supabaseAnonKey')?.value?.trim(),
    userEmail: document.getElementById('syncEmail')?.value?.trim() || state.sync.userEmail,
  });
  save();
  if (rerender) render();
}

window.signUpSync = function() { authenticateSync('signup'); };
window.signInSync = function() { authenticateSync('signin'); };
window.signOutSync = function() {
  clearTimeout(syncTimer);
  state.sync = normalizeSync({ ...state.sync, accessToken: '', refreshToken: '', userId: '' });
  save();
  render();
};

window.pushSync = async function() {
  try {
    assertSyncReady(true);
    await saveCloudState(getSyncPayload());
    alert('Pushed to Supabase.');
    render();
  } catch(e) {
    alert(e.message || 'Push failed.');
  }
};

window.pullSync = async function() {
  try {
    assertSyncReady(true);
    if (!confirm('Pull cloud data and merge it with this device? Newer decks and cards win when there is a conflict.')) return;
    const rows = await supabaseRequest(`/rest/v1/recall_sync_state?select=payload,updated_at&user_id=eq.${encodeURIComponent(state.sync.userId)}&limit=1`);
    if (!rows || !rows.length) throw new Error('No cloud backup found for this account.');
    applySyncPayload(rows[0].payload || {});
    state.sync = normalizeSync({ ...state.sync, lastSync: Date.parse(rows[0].updated_at) || Date.now() });
    state.currentDeckId = null;
    state.view = 'home';
    save();
    await saveCloudState(getSyncPayload());
    alert('Merged with Supabase.');
    render();
  } catch(e) {
    alert(e.message || 'Pull failed.');
  }
};

window.startReview = function(deckId) {
  const deck = state.decks.find(d => d.id === deckId);
  if (!deck) return;
  const due = getDueCards(deck.cards);
  if (due.length === 0) return;
  const newCards = due.filter(card => (card.learningState || inferLearningState(card)) === 'new').slice(0, state.settings.newCardsPerSession);
  const reviewCards = due.filter(card => (card.learningState || inferLearningState(card)) !== 'new');
  const limited = [...reviewCards, ...newCards].slice(0, state.settings.reviewsPerSession);
  const shuffled = [...limited].sort((a,b) => a.nextReview - b.nextReview || Math.random() - 0.5);
  state.currentDeckId = deckId;
  state.reviewQueue = shuffled;
  state.reviewIndex = 0;
  state.flipped = false;
  state.stats = { reviewed:0, again:0, hard:0, good:0, easy:0 };
  state.showDone = false;
  state.view = 'review';
  render();
};

window.flipCard = function() {
  state.flipped = true;
  render();
};

window.answerCard = function(quality) {
  const card = state.reviewQueue[state.reviewIndex];
  const deck = getDeck();
  if (!card || !deck) return;
  
  const updates = getNextReview(quality, card);
  const realCard = deck.cards.find(c => c.id === card.id);
  if (realCard) {
    Object.assign(realCard, updates);
    touchCard(deck, realCard);
  }

  const keys = ['again','hard','good','easy'];
  state.stats.reviewed++;
  state.stats[keys[quality]]++;
  recordDailyReview(quality, deck.id, card.id);
  save();

  if (quality === 0 && state.settings.buryAgainCards) {
    const reinsert = Math.min(state.reviewIndex + 3 + Math.floor(Math.random()*3), state.reviewQueue.length);
    state.reviewQueue.splice(reinsert, 0, { ...card, ...updates });
  }

  if (state.reviewIndex + 1 >= state.reviewQueue.length) {
    state.showDone = true;
  } else {
    state.reviewIndex++;
    state.flipped = false;
  }
  render();
};

function bindEvents() {
  const deckInput = document.getElementById('deckName');
  if (deckInput) deckInput.addEventListener('keydown', e => { if (e.key === 'Enter') addDeck(); });
  const searchInput = document.getElementById('searchCards');
  if (searchInput) searchInput.addEventListener('input', e => {
    state.searchQuery = e.target.value;
    render();
    setTimeout(() => {
      const next = document.getElementById('searchCards');
      if (next) {
        next.focus();
        next.selectionStart = next.selectionEnd = next.value.length;
      }
    }, 0);
  });
  const importInput = document.getElementById('importFile');
  if (importInput) importInput.addEventListener('change', importData);
}

window.exportData = function() {
  const data = {
    app: 'Recall',
    version: 1,
    exportedAt: new Date().toISOString(),
    decks: state.decks,
    appStats: state.appStats,
    reviewLog: state.reviewLog,
    tombstones: state.tombstones,
    profile: state.profile,
    settings: state.settings,
    sync: state.sync,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `recall-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
};

async function importData(event) {
  const file = event.target.files?.[0];
  event.target.value = '';
  if (!file) return;
  try {
    const parsed = JSON.parse(await file.text());
    const importedDecks = normalizeDecks(parsed.decks || parsed);
    if (!importedDecks.length) throw new Error('No decks found');
    if (!confirm('Import this backup? It will replace the current decks on this device.')) return;
    state.decks = importedDecks;
    state.appStats = normalizeStats(parsed.appStats || parsed.stats || {});
    state.reviewLog = normalizeReviewLog(parsed.reviewLog || []);
    state.tombstones = normalizeTombstones(parsed.tombstones || []);
    state.appStats = deriveStatsFromReviewLog(state.reviewLog, state.appStats);
    state.profile = normalizeProfile(parsed.profile || state.profile);
    state.settings = normalizeSettings(parsed.settings || state.settings);
    state.sync = normalizeSync(parsed.sync || state.sync);
    state.currentDeckId = null;
    state.view = 'home';
    save();
    render();
  } catch(e) {
    alert('Could not import this file. Please choose a valid Recall JSON backup.');
  }
}

document.addEventListener('keydown', e => {
  if (!state.settings.keyboardShortcuts) return;
  if (e.target.matches('input, textarea')) return;
  if (state.view !== 'review') return;
  if (e.key === ' ' && !state.flipped) {
    e.preventDefault();
    flipCard();
  }
  if (state.flipped && ['1','2','3','4'].includes(e.key)) {
    answerCard(Number(e.key) - 1);
  }
});

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') autoPullSync();
  else autoPushSync();
});

window.addEventListener('online', () => autoPullSync());
window.addEventListener('beforeunload', () => {
  if (canAutoSync()) autoPushSync();
});

// INIT
load();
render();
setTimeout(() => autoPullSync(), 500);
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
